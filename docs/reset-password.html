<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Sidekick</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0a05;color:#f5deb3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#1a0f07;border:1px solid rgba(255,180,80,.15);border-radius:18px;padding:36px 32px;width:100%;max-width:380px;text-align:center}
    .logo{width:52px;height:52px;margin:0 auto 20px;background:linear-gradient(135deg,#cf6e3c,#b84830);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
    h1{font-size:20px;font-weight:700;color:#f5deb3;margin-bottom:8px}
    p{font-size:14px;color:rgba(245,222,179,.6);line-height:1.6;margin-bottom:24px}
    input{width:100%;padding:12px 14px;background:rgba(255,180,80,.06);border:1px solid rgba(255,180,80,.2);border-radius:10px;color:#f5deb3;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;transition:border-color .15s}
    input:focus{border-color:rgba(255,180,80,.5)}
    button{width:100%;padding:13px;background:#cf6e3c;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
    button:hover{opacity:.88}
    button:disabled{opacity:.5;cursor:not-allowed}
    .msg{font-size:13px;margin-top:14px;min-height:20px;line-height:1.5}
    .msg.ok{color:#6dbb7a}
    .msg.err{color:#e07070}
    .open-app{display:none;margin-top:16px;padding:12px;background:rgba(255,180,80,.08);border:1px solid rgba(255,180,80,.2);border-radius:10px;font-size:13px;color:rgba(245,222,179,.7)}
    .open-app a{color:#cf6e3c;text-decoration:none;font-weight:600}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">⚡</div>
  <h1 id="title">Set new password</h1>
  <p id="subtitle">Enter your new password below. You'll be redirected to the app automatically.</p>

  <div id="form-area">
    <input type="password" id="pw" placeholder="New password (min 6 chars)" autocomplete="new-password"/>
    <input type="password" id="pw2" placeholder="Confirm new password" autocomplete="new-password"/>
    <button id="btn">Update password</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="open-app" id="open-app-hint">
    Password updated! <a href="sidekick://" id="app-link">Open Sidekick</a> or close this tab.
  </div>
</div>

<script>
// Supabase project URL — injected at deploy via the docs site (public, same as app.config)
const SUPABASE_URL = 'https://wgiunwhzrzjjhtdijofq.supabase.co';

function getHashParam(key) {
  const h = window.location.hash.replace('#', '');
  const p = new URLSearchParams(h);
  return p.get(key);
}

const accessToken  = getHashParam('access_token');
const refreshToken = getHashParam('refresh_token');
const type         = getHashParam('type');

// Not a recovery link
if (type !== 'recovery' || !accessToken) {
  document.getElementById('title').textContent    = 'Invalid link';
  document.getElementById('subtitle').textContent = 'This password reset link has expired or is invalid. Request a new one from the Sidekick app.';
  document.getElementById('form-area').style.display = 'none';
}

document.getElementById('btn').addEventListener('click', async () => {
  const pw   = document.getElementById('pw').value;
  const pw2  = document.getElementById('pw2').value;
  const msg  = document.getElementById('msg');
  const btn  = document.getElementById('btn');

  msg.className = 'msg'; msg.textContent = '';

  if (pw.length < 6) { msg.className='msg err'; msg.textContent='Password must be at least 6 characters.'; return; }
  if (pw !== pw2)    { msg.className='msg err'; msg.textContent='Passwords do not match.'; return; }

  btn.disabled = true; btn.textContent = 'Updating…';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndnaXVud2h6cnpqamh0ZGlqb2ZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDY0NjEsImV4cCI6MjA5NTgyMjQ2MX0.PuiGPWtr9Tzle2b3_M0QAY0ESx9PWVIEhzJlDWVkcV8',
        'Authorization': `Bearer ${accessToken}`,
      },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg || data.error_description || 'Update failed');

    btn.style.display = 'none';
    document.getElementById('pw').style.display  = 'none';
    document.getElementById('pw2').style.display = 'none';
    document.getElementById('open-app-hint').style.display = 'block';
    msg.className = 'msg ok';
    msg.textContent = '✓ Password updated successfully.';

    // Try to deep-link back into app (works on macOS with the sidekick:// protocol)
    setTimeout(() => { window.location.href = 'sidekick://reset-done'; }, 800);
  } catch(e) {
    msg.className = 'msg err';
    msg.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Update password';
  }
});
</script>
</body>
</html>
