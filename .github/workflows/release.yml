name: Build & Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:       # lets you trigger a build manually from GitHub

permissions:
  contents: write          # needed to upload release assets

jobs:
  # ── macOS: arm64 DMG + x64 DMG ─────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon (.png + .icns)
        run: npm run gen-icon

      - name: Build arm64 DMG
        run: npx electron-builder --mac dmg --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build x64 DMG
        run: npx electron-builder --mac dmg --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac DMGs
        uses: actions/upload-artifact@v4
        with:
          name: Sidekick-mac
          path: dist/*.dmg

  # ── Windows: x64 EXE installer ─────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon (.png + .ico via Electron)
        shell: pwsh
        run: |
          # Run gen-icon; electron-builder will convert icon.png → icon.ico
          # on Windows if icon.ico is missing
          npm run gen-icon
        continue-on-error: true   # icon.ico auto-created by electron-builder anyway

      - name: Build Windows EXE
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Sidekick-win
          path: dist/*.exe

  # ── GitHub Release: attach all files ───────────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: Sidekick-mac
          path: artifacts/mac

      - name: Download Win artifacts
        uses: actions/download-artifact@v4
        with:
          name: Sidekick-win
          path: artifacts/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sidekick ${{ github.ref_name }}"
          body: |
            ## Sidekick ${{ github.ref_name }}

            ## ⬇️ Download — pick the right file

            | # | Platform | File to download |
            |---|----------|-----------------|
            | 1 | 🍎 **Mac — Apple Silicon** (M1 / M2 / M3 / M4) | `Sidekick-*-arm64.dmg` |
            | 2 | 🍎 **Mac — Intel** (older Macs, pre-2020) | `Sidekick-*-x64.dmg` |
            | 3 | 🪟 **Windows** 10 / 11 | `Sidekick-*-Setup.exe` |

            > **Not sure which Mac?** Click 🍎 → About This Mac → chip says M1/M2/M3/M4 → use `arm64.dmg`. Says Intel Core i5/i7/i9 → use `x64.dmg`.

            ---

            ### Install
            **Mac:** Open the `.dmg` → drag Sidekick to Applications → launch.
            First time: right-click the app → Open → Open anyway (Gatekeeper bypass, unsigned build).

            **Windows:** Run `Sidekick-*-Setup.exe`. If SmartScreen appears → More info → Run anyway.
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
