name: Build & Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:       # manual trigger for testing — no tag needed

permissions:
  contents: write

jobs:
  # ── macOS: arm64 DMG + x64 DMG ─────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Icons already committed to build/ — no gen-icon needed in CI

      - name: Write app config
        shell: bash
        run: |
          cat > app.config.js << 'CONF'
          module.exports = {
            geminiKey:    '${{ secrets.GEMINI_KEY }}',
            anthropicKey: '${{ secrets.ANTHROPIC_KEY }}',
            ownerMode: false,
          };
          CONF

      - name: Build arm64 DMG
        run: npx electron-builder --mac dmg --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build x64 DMG
        run: npx electron-builder --mac dmg --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac DMGs
        uses: actions/upload-artifact@v4
        with:
          name: Sidekick-mac
          path: dist/*.dmg

  # ── Windows: x64 NSIS installer ────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Icons already committed to build/ — no gen-icon needed in CI

      - name: Write app config
        shell: bash
        run: |
          cat > app.config.js << 'CONF'
          module.exports = {
            geminiKey:    '${{ secrets.GEMINI_KEY }}',
            anthropicKey: '${{ secrets.ANTHROPIC_KEY }}',
            ownerMode: false,
          };
          CONF

      - name: Generate build/icon.ico from PNG
        shell: node {0}
        run: |
          // Embed PNG inside ICO container (Vista+ format — supported by Windows 10/11)
          const fs = require('fs');
          const png = fs.readFileSync('build/icon.png');

          const hdr = Buffer.allocUnsafe(6);
          hdr.writeUInt16LE(0, 0);   // reserved
          hdr.writeUInt16LE(1, 2);   // type: 1 = icon
          hdr.writeUInt16LE(1, 4);   // image count: 1

          const img = Buffer.allocUnsafe(16);
          img.writeUInt8(0, 0);       // width  0 = 256px
          img.writeUInt8(0, 1);       // height 0 = 256px
          img.writeUInt8(0, 2);       // colour palette
          img.writeUInt8(0, 3);       // reserved
          img.writeUInt16LE(1, 4);    // colour planes
          img.writeUInt16LE(32, 6);   // bits per pixel
          img.writeUInt32LE(png.length, 8);   // PNG data size
          img.writeUInt32LE(22, 12);  // offset of PNG data (6 hdr + 16 img entry)

          fs.writeFileSync('build/icon.ico', Buffer.concat([hdr, img, png]));
          console.log('✓  build/icon.ico  (' + png.length + ' bytes)');

      - name: Build Windows EXE
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Sidekick-win
          path: dist/*.exe

  # ── GitHub Release — only on real version tags ──────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: Sidekick-mac
          path: artifacts/mac

      - name: Download Win artifacts
        uses: actions/download-artifact@v4
        with:
          name: Sidekick-win
          path: artifacts/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sidekick ${{ github.ref_name }}"
          body: |
            ## Sidekick ${{ github.ref_name }}

            ## ⬇️ Download — pick the right file

            | # | Platform | File |
            |---|----------|------|
            | 1 | 🍎 **Mac — Apple Silicon** (M1/M2/M3/M4) | `Sidekick-*-arm64.dmg` |
            | 2 | 🍎 **Mac — Intel** (pre-2020) | `Sidekick-*-x64.dmg` |
            | 3 | 🪟 **Windows** 10/11 | `Sidekick-*-Setup.exe` |

            > **Not sure which Mac?** 🍎 → About This Mac → chip says M1/M2/M3/M4 → use `arm64.dmg`. Says Intel Core → use `x64.dmg`.

            ### Install
            **Mac:** Open `.dmg` → drag to Applications → right-click → Open → Open anyway (unsigned build).
            **Windows:** Run `Sidekick-*-Setup.exe` → if SmartScreen appears → More info → Run anyway.
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
